name: Benchmark

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ['3.10', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Set up UV
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: true

    - name: Install dependencies
      run: uv sync --extra dev

    # Run performance tests that exist in the current codebase
    - name: Run performance tests
      run: uv run pytest tests/performance/ -xvs

    # Run the main benchmark script
    - name: Run standard benchmarks
      run: |
        mkdir -p benchmark_results
        # Run benchmarks with different record counts
        uv run python scripts/run_benchmarks.py --standard --sizes 100 1000

    - name: Run memory optimization benchmarks
      run: |
        # Test memory usage optimization
        uv run python scripts/run_benchmarks.py --memory

    - name: Run streaming benchmarks
      run: |
        # Test streaming processing
        uv run python scripts/run_benchmarks.py --streaming

    - name: Run array handling benchmarks
      run: |
        # Test array handling performance
        uv run python scripts/run_benchmarks.py --arrays

    - name: Run all benchmark suites
      run: |
        # Run comprehensive benchmark suite
        uv run python scripts/run_benchmarks.py --all --sizes 500 2000

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-py${{ matrix.python-version }}
        path: benchmark_results.json
